<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{TITLE_TEXT}}</title>
<style>
:root{--primary:#6366f1;--accent:#c9a227;--bg:#0a0a0a;--bg-2:#141414;--bg-3:#1a1a1a;--card:rgba(17,17,17,.78);--border:rgba(255,255,255,.12);--text:#ffffff;--muted:#a1a1aa;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(1400px 900px at 15% -10%, rgba(99,102,241,.20) 0%, transparent 42%),radial-gradient(1200px 760px at 110% 10%, rgba(34,211,238,.14) 0%, transparent 44%),radial-gradient(900px 640px at 50% 120%, rgba(201,162,39,.10) 0%, transparent 48%),linear-gradient(160deg,var(--bg) 0%,var(--bg-2) 45%,var(--bg-3) 100%);min-height:100vh;padding:34px 18px;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:-10% auto auto -8%;width:420px;height:420px;border-radius:999px;background:radial-gradient(circle, rgba(129,140,248,.26) 0%, rgba(129,140,248,.14) 32%, rgba(129,140,248,0) 68%);filter:blur(18px);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:auto -6% 8% auto;width:460px;height:460px;border-radius:999px;background:radial-gradient(circle, rgba(34,211,238,.18) 0%, rgba(34,211,238,.10) 34%, rgba(34,211,238,0) 70%);filter:blur(24px);pointer-events:none;z-index:0}
.container{max-width:1100px;margin:0 auto;position:relative;z-index:1}.header{text-align:center;margin-bottom:24px;position:relative}.header::before{content:'';position:absolute;left:50%;top:-22px;transform:translateX(-50%);width:min(760px,92%);height:220px;background:radial-gradient(ellipse at center, rgba(201,162,39,.10) 0%, rgba(99,102,241,.08) 38%, rgba(0,0,0,0) 72%);filter:blur(18px);pointer-events:none}.badge{display:inline-block;background:linear-gradient(135deg,var(--accent),#e8b84b);color:#000;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:800;text-transform:uppercase;margin-bottom:12px;box-shadow:0 8px 32px rgba(201,162,39,.22)}h1{font-size:2rem;margin-bottom:8px;text-shadow:0 8px 40px rgba(99,102,241,.18)}.title-accent{color:#8b90ff;font-weight:900;font-size:1em;line-height:inherit;letter-spacing:inherit;text-shadow:0 0 26px rgba(129,140,248,.28)}.subtitle{color:var(--muted);max-width:760px;margin:0 auto;line-height:1.6}
.card{background:linear-gradient(180deg, rgba(22,22,28,.82) 0%, rgba(17,17,17,.78) 100%);border:1px solid rgba(255,255,255,.10);box-shadow:0 10px 40px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.04);border-radius:20px;padding:20px;margin-bottom:12px;backdrop-filter:blur(18px)}.card-header{display:grid;grid-template-columns:42px minmax(0,1fr) auto;align-items:center;column-gap:14px;margin-bottom:14px}.step{width:42px;height:42px;border-radius:999px;flex-shrink:0;background:radial-gradient(circle at 30% 30%, #8b90ff 0%, var(--primary) 45%, #4f46e5 100%);box-shadow:0 10px 28px rgba(99,102,241,.28), inset 0 1px 0 rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.98rem}.meta{color:var(--muted);font-size:.82rem;white-space:nowrap}
.card > * + * { margin-top: 12px; }
.card h2{font-size:1.15rem;line-height:1.2;margin:0}.card p{color:var(--muted);line-height:1.6}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:12px}.kpi .label{display:block;font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.35}.kpi .value{display:block;font-size:1.25rem;font-weight:800;color:#fff;line-height:1.2}
.meta-block{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.24);border-radius:12px;padding:14px}.meta-row{display:grid;grid-template-columns:minmax(140px,220px) minmax(0,1fr);align-items:start;gap:14px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.92rem}.meta-row:last-child{border-bottom:none}.meta-key{color:var(--muted);line-height:1.4}.meta-val{color:#fff;font-weight:600;line-height:1.4;word-break:break-word}
table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.92rem}th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left}th{color:#fff;font-weight:700}td{color:#d4d4d8}
ul.clean{list-style:none;display:grid;gap:8px}ul.clean li{display:flex;gap:8px;line-height:1.5}ul.clean li::before{content:'→';color:var(--muted)}
ol.clean.ordered{list-style:none;counter-reset:pt;display:grid;gap:8px;padding-left:0;margin:4px 0 0}
ol.clean.ordered li{counter-increment:pt;display:flex;gap:10px;color:#fff;line-height:1.55;margin:0}
ol.clean.ordered li::before{content:counter(pt)'.';min-width:1.35em;color:#d4d4d8;font-weight:700;text-align:right;flex-shrink:0}
.quote{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.28);border-radius:14px;padding:15px;color:#d7dcff;font-style:italic;line-height:1.6}
.question,.note,.warning{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;gap:10px}.question .q-icon,.note .q-icon,.warning .q-icon{flex-shrink:0}.note{border-color:rgba(59,130,246,.35);background:rgba(59,130,246,.06)}.warning{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.07)}
.risk{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.22);border-radius:12px;padding:12px 14px}.check{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.22);border-radius:12px;padding:12px 14px}.take{background:linear-gradient(135deg,rgba(99,102,241,.10),rgba(139,92,246,.08));border:1px solid rgba(129,140,248,.30);border-radius:12px;padding:12px 14px}.avoid{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.24);border-radius:12px;padding:12px 14px}
.verdict{background:linear-gradient(135deg,rgba(201,162,39,.14),rgba(99,102,241,.10));border:1px solid rgba(201,162,39,.28);border-radius:16px;padding:16px 18px}.verdict-title{font-size:1rem;font-weight:800;color:#fff;margin-bottom:6px}.verdict-body{color:#e5e7eb;line-height:1.6}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0}.compare-side{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:14px}.compare-side.alt{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.26)}.compare-label{font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;color:#c7d2fe;margin-bottom:8px;font-weight:800}.compare-body{color:#fff;line-height:1.55}
.phase-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:14px;min-height:120px}.phase-emoji{font-size:1.25rem;margin-bottom:10px}.phase-title{font-size:.95rem;font-weight:800;color:#fff;margin-bottom:8px}.phase-desc{color:#d4d4d8;line-height:1.55}
.decision{background:rgba(255,255,255,.03);border:1px solid rgba(99,102,241,.26);border-radius:14px;padding:14px}.decision-title{font-size:.8rem;letter-spacing:.04em;text-transform:uppercase;color:#c7d2fe;font-weight:800;margin-bottom:8px}.decision-answer{color:#fff;font-weight:700;line-height:1.55}.decision-why{color:#d4d4d8;line-height:1.55;margin-top:8px}
.timeline{position:relative;display:grid;gap:12px}.timeline::before{content:'';position:absolute;left:15px;top:6px;bottom:6px;width:2px;background:rgba(255,255,255,.10)}.timeline-item{position:relative;display:grid;grid-template-columns:32px minmax(0,1fr);gap:12px;align-items:start}.timeline-node{width:32px;height:32px;border-radius:999px;background:linear-gradient(135deg,var(--primary),#818cf8);display:flex;align-items:center;justify-content:center;position:relative;z-index:1}.timeline-content{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:12px 14px}.timeline-label{font-size:.88rem;font-weight:800;color:#fff;margin-bottom:6px}.timeline-body{color:#d4d4d8;line-height:1.55}
.stack{display:grid;gap:10px}.stack-item{display:grid;grid-template-columns:42px minmax(0,1fr);gap:12px;align-items:start;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:14px}.stack-emoji{font-size:1.25rem;display:flex;align-items:center;justify-content:center}.stack-title{font-size:.95rem;font-weight:800;color:#fff;margin-bottom:6px}.stack-body{color:#d4d4d8;line-height:1.55}
.entity-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:14px;min-height:130px}.entity-emoji{font-size:1.2rem;margin-bottom:10px}.entity-title{font-size:.95rem;font-weight:800;color:#fff;margin-bottom:8px}.entity-body{color:#d4d4d8;line-height:1.55}
.rich-link{color:#fff;text-decoration:none;border-bottom:1px dashed rgba(99,102,241,.6)}.rich-link:hover{color:#818cf8;border-bottom-color:#818cf8}
.table-wrap{margin-top:14px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:rgba(255,255,255,.03);box-shadow:0 8px 26px rgba(0,0,0,.18)}table{width:100%;border-collapse:separate;border-spacing:0}th,td{padding:14px 16px;text-align:left;vertical-align:top;border-bottom:1px solid rgba(255,255,255,.08)}th{color:#fff;background:rgba(124,156,255,.14);font-weight:800}td{color:var(--muted)}tbody tr:last-child td{border-bottom:none}
.footer{margin-top:22px;text-align:center;color:var(--muted);font-size:.82rem}
@media(max-width:900px){.grid-2,.grid-3,.compare{grid-template-columns:1fr}h1{font-size:1.7rem}.meta-row{grid-template-columns:1fr;gap:4px}.meta-val{text-align:left}}

    /* mobile-safe-present patch */
    pre {
      max-width: 100%;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      overflow: auto;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      line-height: 1.55;
    }
    code {
      white-space: inherit;
      overflow-wrap: inherit;
      word-break: inherit;
    }

    @media (max-width: 640px) {
      body { padding: 24px 14px; }
      .container { max-width: 100%; }
      .card { padding: 16px; }
      .card-header {
        grid-template-columns: 42px minmax(0, 1fr);
        row-gap: 6px;
      }
      .card-header .meta {
        grid-column: 2;
        justify-self: start;
        white-space: normal;
      }
      .meta { white-space: normal; }
      .timeline-content, .stack-item, .entity-card, .phase-card, .decision, .verdict,
      .compare-side, .kpi, .meta-block, .mini, .infra-item, .team-item {
        min-width: 0;
      }
      div[style*="flex:1 1 220px"][style*="min-width:220px"] {
        flex: 1 1 100% !important;
        min-width: 0 !important;
      }
      div[style*="min-width:54px"][style*="font-size:24px"] {
        flex: 0 0 100% !important;
        min-width: 0 !important;
        padding: 0 !important;
      }
      div[style*="grid-template-columns:minmax(110px,180px) minmax(0,1fr) auto"] {
        grid-template-columns: 1fr !important;
      }
      div[style*="grid-template-columns:minmax(0,1fr) auto minmax(0,1fr)"] {
        grid-template-columns: 1fr !important;
      }
      div[style*="white-space:nowrap"] {
        white-space: normal !important;
        text-align: left !important;
      }
      pre, code {
        white-space: pre-wrap !important;
        overflow-wrap: anywhere !important;
        word-break: break-word !important;
      }
    }
    /* /mobile-safe-present patch */

  </style></head><body><main class="container"><header class="header"><div class="badge">{{BADGE}}</div><h1>{{TITLE}}</h1><p class="subtitle">{{SUBTITLE}}</p></header>{{CONTENT_BLOCKS}}<div class="footer">{{FOOTER}}</div></main></body></html>
